<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAR Associates</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- AOS ANIMATION -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    z-index: 1000;
}

nav a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 3.5em;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    -webkit-background-clip: text;
    color: transparent;
}

.hero button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
}

/* SECTIONS */
section {
    padding: 80px 20px;
    max-width: 1200px;
    margin: auto;
}

/* SERVICES */
.services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 25px rgba(0, 198, 255, 0.5);
}

/* ABOUT */
.about {
    text-align: center;
}

/* CONTACT */
form {
    max-width: 400px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25d366;
    padding: 15px;
    border-radius: 50%;
}

/* ANIMATION */
.glow {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00c6ff; }
    to { text-shadow: 0 0 25px #0072ff; }
}
</style>
</head>

<body>

<header>
    <h2>RAR Associates</h2>
    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">
    <div>
        <h1 class="glow">Grow Your Business 🚀</h1>
        <p>Premium Consultancy for SMEs</p>
        <button onclick="document.getElementById('services').scrollIntoView()">Explore</button>
    </div>
</section>

<section id="services">
    <h2 data-aos="fade-up">Our Services</h2>

    <div class="services">
        <div class="card" data-aos="zoom-in"><h3>IPO Consultancy</h3></div>
        <div class="card" data-aos="zoom-in"><h3>GST & Tax</h3></div>
        <div class="card" data-aos="zoom-in"><h3>Company Registration</h3></div>
        <div class="card" data-aos="zoom-in"><h3>Trademark</h3></div>
    </div>
</section>

<section class="about">
    <h2 data-aos="fade-up">About</h2>
    <p data-aos="fade-up">Led by Ronak Sultania with 7+ years experience.</p>
</section>

<section id="contact">
    <h2 data-aos="fade-up">Contact</h2>

    <form id="contactForm">
        <textarea id="message" placeholder="Message"></textarea>
        <input id="mobile" placeholder="Mobile Number">
        <button type="submit">Send WhatsApp</button>
    </form>
</section>

<footer>
    <p>© 2026 RAR Associates</p>
    <p>Total Visitors: <span id="visitorCount">Loading...</span></p>
</footer>

<a href="https://wa.me/918910282466" class="whatsapp">
    <i class="fab fa-whatsapp"></i>
</a>

<!-- SCRIPTS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

/* WHATSAPP */
document.getElementById('contactForm').addEventListener('submit', function(e){
    e.preventDefault();
    let msg = document.getElementById('message').value;
    let mobile = document.getElementById('mobile').value;

    let url = `https://wa.me/918910282466?text=${encodeURIComponent(msg + " Mobile: " + mobile)}`;
    window.open(url);
});

/* VISITOR COUNTER */
fetch('https://api.countapi.xyz/hit/rarassociates-premium/visits')
.then(res => res.json())
.then(data => {
    document.getElementById('visitorCount').innerText = data.value;
});
</script>

</body>
</html>
